# Default values for Bifrost
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Bifrost application configuration
replicaCount: 1

image:
  # Container image repository
  # Default: Docker Hub public image
  # For enterprise customers with private registry, use full URL:
  #   repository: us-west1-docker.pkg.dev/bifrost-enterprise/your-org/bifrost
  #   repository: your-registry.example.com/your-org/bifrost
  #   repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/bifrost
  repository: docker.io/maximhq/bifrost
  pullPolicy: IfNotPresent
  # REQUIRED: Specify the image tag (e.g., v1.5.0, latest)
  # Docker images are tagged with v prefix (e.g., v1.5.0)
  # See available tags at: https://hub.docker.com/r/maximhq/bifrost/tags
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  podDiscovery:
    # Create Role/RoleBinding to allow pod discovery in-cluster.
    # This is rendered only when:
    # - bifrost.cluster.enabled=true
    # - bifrost.cluster.discovery.enabled=true
    # - bifrost.cluster.discovery.type=kubernetes
    enabled: true

# Annotations to add to the deployment metadata
# Useful for tools like Keel (keel.sh) for automatic image updates
# Example:
#   deploymentAnnotations:
#     keel.sh/policy: force
#     keel.sh/trigger: poll
deploymentAnnotations: {}

# Labels to add to the deployment metadata (in addition to default labels)
deploymentLabels: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsNonRoot: true

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  annotations: {}

# Single ingress (legacy format):
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: bifrost.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
# Named ingresses map (new format) — replaces the single ingress above.
# Each key becomes a separate Ingress resource named "<release>-<key>".
# Use this when you need multiple ingress controllers (e.g. public + internal).
# ingress:
#   public:
#     enabled: true
#     className: nginx-public
#     annotations: {}
#     hosts:
#       - host: bifrost.example.com
#         paths:
#           - path: /
#             pathType: Prefix
#     tls: []
#   internal:
#     enabled: true
#     className: nginx-internal
#     annotations: {}
#     hosts:
#       - host: bifrost.internal.example.com
#         paths:
#           - path: /
#             pathType: Prefix
#     tls: []

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  # HPA scaling behavior configuration
  # Controls how quickly the HPA scales up/down to prevent connection disruption
  behavior:
    scaleDown:
      # Stabilization window prevents rapid scale-down oscillation.
      # The HPA will wait this long after the last scale event before scaling down again.
      # Important for long-lived streaming connections (e.g. SSE for LLM inference).
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30

# Additional volumes on the output Deployment definition.
volumes: []

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

# Deployment rolling update strategy. Applies to the Deployment only (not the
# StatefulSet used for sqlite-with-persistence). Rendered verbatim into spec.strategy.
# Empty ({}) uses the Kubernetes default (RollingUpdate, maxSurge 25%, maxUnavailable 25%).
# For HA gateway deployments, surge-only rollouts avoid dropping capacity:
# strategy:
#   type: RollingUpdate
#   rollingUpdate:
#     maxSurge: 100%
#     maxUnavailable: 0%
strategy: {}

# Graceful shutdown configuration for long-lived connections (SSE streaming)
# When a pod is terminated (e.g. during HPA scale-down), active streaming connections
# are severed abruptly. This causes clients to lose their SSE stream mid-response.
# The preStop hook and termination grace period give in-flight requests time to complete.
terminationGracePeriodSeconds: 60
lifecycle:
  preStop:
    exec:
      # Sleep allows the pod to be removed from the Service endpoints and load balancer
      # before the process starts shutting down, preventing new connections from arriving
      # while existing ones drain.
      command: ["sh", "-c", "sleep 15"]

# Bifrost specific configuration
# You can find entire schema at https://getbifrost.ai/schema
bifrost:
  # Application settings
  appDir: /app/data
  port: 8080
  host: 0.0.0.0
  logLevel: info
  logStyle: json
  # envLabel: staging  # Short label (max 10 chars) shown in the UI sidebar to identify the environment

  # Controls how config.json is reconciled with the database on startup.
  # "split" (default): existing merge behavior — file and DB rows coexist.
  # "config.json": sections explicitly present in the file are authoritative;
  #   database-only rows for those sections are pruned on startup.
  # sourceOfTruth: "config.json"

  # Encryption key for sensitive data
  # Can be set as a secret or environment variable
  encryptionKey: ""

  # Use an existing Kubernetes secret for the encryption key.
  # When `name` is set, takes precedence over `encryptionKey`: the chart
  # injects BIFROST_ENCRYPTION_KEY into the pod via secretKeyRef and writes
  # `encryption_key: "env.BIFROST_ENCRYPTION_KEY"` in the rendered config.json.
  encryptionKeySecret:
    name: ""
    key: "encryption-key"

  # Authentication configuration (top-level)
  # This controls authentication for Bifrost API and dashboard
  authConfig:
    adminUsername: ""
    adminPassword: ""
    isEnabled: false
    # Use existing Kubernetes secret for admin credentials
    existingSecret: ""
    usernameKey: "username"
    passwordKey: "password"

  # Feature flag boot overrides. Flags themselves are code-declared inside
  # Bifrost (via featureflags.Register); this map only sets their initial
  # values. Anything set here is rendered as a "locked" flag in the UI —
  # operators must edit values.yaml (and redeploy) to change it, which
  # matches the GitOps invariant that Helm-managed values are authoritative.
  #
  # Each key is a flag name; each value carries `enabled`. The `enabled`
  # field accepts either a literal boolean OR an "env.NAME" string so the
  # actual on/off decision can come from a container env var without
  # re-templating the chart.
  #
  # Example:
  #   featureFlags:
  #     experimental.streaming-mux:
  #       enabled: true
  #     audit.verbose:
  #       enabled: "env.BIFROST_AUDIT_VERBOSE"
  featureFlags: {}

  # Client configuration
  client:
    dropExcessRequests: false
    initialPoolSize: 300
    allowedOrigins:
      - "*"
    enableLogging: true
    disableContentLogging: false
    disableDbPingsInHealth: false
    logRetentionDays: 365
    # Deprecated: use enforceAuthOnInference instead.
    enforceGovernanceHeader: false
    # Require auth (VK, API key, or user token) on inference endpoints.
    # Open by default in the raw binary; this chart enables enforcement for production.
    enforceAuthOnInference: true
    maxRequestBodySizeMb: 100
    compat:
      convertTextToChat: false
      convertChatToResponses: false
      shouldDropParams: false
      shouldConvertParams: false
    prometheusLabels: []
    # Header filtering configuration for x-bf-eh-* headers forwarded to LLM providers
    headerFilterConfig:
      allowlist: []
      denylist: []
    # asyncJobResultTTL: 3600       # Default TTL for async job results in seconds
    # requiredHeaders: []            # Headers that must be present on every request
    # loggingHeaders: []             # Headers to capture in log metadata
    # allowedHeaders: []             # Additional allowed headers for CORS and WebSocket
    # Deprecated MCP global settings (use bifrost.mcp.toolManagerConfig and bifrost.mcp.toolSyncInterval instead):
    # mcpAgentDepth: 10
    # mcpToolExecutionTimeout: 30
    # mcpCodeModeBindingLevel: "server"
    # mcpToolSyncInterval: 10
    # mcpDisableAutoToolInject: false
    # mcpEnableTempTokenAuth: false
    # hideDeletedVirtualKeysInFilters: false  # Omit deleted virtual keys from logs/MCP filter data
    # whitelistedRoutes: []           # Routes that bypass auth middleware
    # routingChainMaxDepth: 10        # Maximum depth for routing rule chain evaluation
    # allowDirectKeys: false          # Allow callers to bypass the key pool via x-bf-direct-key + Authorization header
    # mcpExternalClientUrl: ""        # Public base URL used as redirect_uri when Bifrost is an OAuth client to MCP servers

  # Server configuration
  server:
    readBufferSize: 65536      # Read buffer size in bytes for reading HTTP headers (default: 64 KiB)

  # Framework configuration
  framework:
    pricing:
      # Custom pricing URL for model cost data
      pricingUrl: "https://getbifrost.ai/datasheet"
      # Custom model parameters URL
      modelParametersUrl: "https://getbifrost.ai/datasheet/model-parameters"
      # Sync interval in seconds (default: 86400 = 24 hours, minimum: 3600)
      pricingSyncInterval: 86400
      # Custom MCP server catalog URL (optional, leave empty to use the default Bifrost catalog)
      # mcpLibraryUrl: ""
      # MCP library sync interval in seconds (default: 86400 = 24 hours, minimum: 3600)
      # mcpLibrarySyncInterval: 86400

  # Provider configurations (add your provider keys here)
  # You can specify API keys directly or use env.VAR_NAME syntax to reference environment variables
  # When using existingSecret in providerSecrets, the keys will be injected as env vars and
  # you should use env.VAR_NAME syntax in the value field
  # Note: The entire providers block is passed through to the config as-is.
  # See https://getbifrost.ai/schema for the full provider schema.
  providers: {}
    # openai:
    #   keys:
    #     - name: "primary-key"         # Key name (required, must be unique)
    #       value: "sk-..."             # Direct value
    #       weight: 1
    #       models: ["gpt-4o", "gpt-4o-mini"]  # Restrict key to specific models
    #       use_for_batch_api: false     # Whether this key can be used for batch API
    #     - name: "secondary-key"
    #       value: "env.OPENAI_KEY"     # Reference to environment variable
    #       weight: 1
    #   # Network configuration (optional, per-provider)
    #   network_config:
    #     base_url: ""                                  # Custom base URL (required for Ollama)
    #     extra_headers: {}                             # Additional headers to send with requests
    #     default_request_timeout_in_seconds: 300       # Request timeout
    #     max_retries: 3                                # Maximum number of retries
    #     retry_backoff_initial_ms: 500                 # Initial retry backoff in ms
    #     retry_backoff_max_ms: 5000                    # Max retry backoff in ms
    #     stream_idle_timeout_in_seconds: 60            # Max wait for next stream chunk (default: 60)
    #     max_conns_per_host: 5000                      # Max TCP connections per host (default: 5000)
    #     enforce_http2: false                           # Force HTTP/2 on provider connections (e.g. Bedrock)
    #     insecure_skip_verify: false                   # Disable TLS certificate verification (last resort)
    #     ca_cert_pem: ""                               # PEM-encoded CA cert for self-signed/private CA
    #     allow_private_network: false                  # Allow connections to RFC 1918 private IPs (k8s pod network, LAN, VPC)
    #     beta_header_overrides:                         # Override Anthropic beta header support (optional)
    #       redact-thinking-: true                       # Enable/disable specific beta headers by prefix
    #   # Concurrency configuration (optional)
    #   concurrency_and_buffer_size:
    #     concurrency: 100                              # Number of concurrent requests
    #     buffer_size: 200                              # Buffer size for requests
    #   # Proxy configuration (optional)
    #   proxy_config:
    #     type: "none"                  # Options: none, http, socks5, environment
    #     url: ""
    #     username: ""
    #     password: ""
    #     ca_cert_pem: ""               # PEM-encoded CA cert for SSL-intercepting proxies
    #   send_back_raw_response: false   # Include raw response in BifrostResponse
  #   store_raw_request_response: false # Capture raw payloads for plugins only; not returned to client
  #
  # anthropic:
  #   keys:
  #     - name: "anthropic-key"
  #       value: "sk-ant-..."
  #       weight: 1
  #
  # # Azure OpenAI example (requires azure_key_config)
  # azure:
  #   keys:
  #     - name: "azure-key"
  #       value: "..."
  #       weight: 1
  #       azure_key_config:
  #         endpoint: "https://your-resource.openai.azure.com"
  #         api_version: "2024-02-15-preview"
  #         deployments:
  #           gpt-4o: "my-gpt4o-deployment"
  #
  # # Google Vertex AI example (requires vertex_key_config)
  # vertex:
  #   keys:
  #     - name: "vertex-key"
  #       value: ""
  #       weight: 1
  #       vertex_key_config:
  #         project_id: "my-gcp-project"
  #         region: "us-central1"
  #         auth_credentials: "env.GOOGLE_CREDENTIALS"
  #
  # # AWS Bedrock example (requires bedrock_key_config)
  # bedrock:
  #   keys:
  #     - name: "bedrock-key"
  #       value: ""
  #       weight: 1
  #       bedrock_key_config:
  #         region: "us-east-1"
  #         access_key: "env.AWS_ACCESS_KEY_ID"
  #         secret_key: "env.AWS_SECRET_ACCESS_KEY"

  # Provider secrets - use existing Kubernetes secrets for provider API keys
  # These will be injected as environment variables that can be referenced in providers config
  providerSecrets: {}
    # openai:
    #   existingSecret: "my-openai-secret"
    #   key: "api-key"
    #   envVar: "OPENAI_API_KEY"  # Environment variable name to inject
    # anthropic:
    #   existingSecret: "my-anthropic-secret"
    #   key: "api-key"
    #   envVar: "ANTHROPIC_API_KEY"

  # MCP (Model Context Protocol) configuration
  mcp:
    enabled: false
    clientConfigs: []
      # - name: "example-mcp"
      #   connectionType: "stdio"
      #   stdioConfig:
      #     command: "/path/to/mcp/server"
      #     args: []
      #     envs: []
      #   # Optional: source connection_string from a Kubernetes secret.
      #   # When set, chart injects BIFROST_MCP_<NAME>_CONNECTION_STRING
      #   # into the pod and rewrites connection_string in config.json
      #   # to `env.BIFROST_MCP_<NAME>_CONNECTION_STRING`.
      #   secretRef:
      #     name: ""                               # k8s secret name
      #     connectionStringKey: "connection-string"  # key within the secret
      #
      # - name: "example-https-mcp"
      #   connectionType: "http"
      #   connectionString: "https://my-internal-mcp.corp/mcp"
      #   # TLS configuration for HTTP and SSE connection types.
      #   # Use when the MCP server presents a self-signed or private CA certificate.
      #   tlsConfig:
      #     insecureSkipVerify: false              # Disable TLS verification (dev/test only — takes priority over caCertPem)
      #     caCertPem: "env.MY_MCP_CA_CERT"       # PEM string or env.VAR_NAME reference
      #
      # - name: "example-oauth-mcp"
      #   connectionType: "http"
      #   connectionString: "https://my-mcp.corp/mcp"
      #   # authType "oauth": shared OAuth token; provide oauthConfigId referencing an existing oauth_config.
      #   # authType "per_user_oauth": each user authenticates individually via OAuth flow;
      #   #   oauth_config is registered via the API (POST /api/mcp/clients), not configured here.
      #   authType: "oauth"
      #   oauthConfigId: "my-oauth-config-id"   # ID of the OAuth config created in Bifrost
    # toolSyncInterval: "10m"   # Global tool sync interval (Go duration string, e.g. "10m", "1h", "0s")
    # Tool manager configuration
    toolManagerConfig:
      toolExecutionTimeout: "30s"
      maxAgentDepth: 10
      # codeModeBindingLevel: "server"  # Code mode binding level (server or tool)
      # disableAutoToolInject: false    # Disable automatic MCP tool injection

  # Plugins configuration
  # Plugin version must be >= 1 (schema minimum). Use values > 1 to force DB-backed plugin config replacement on upgrade.
  plugins:
    telemetry:
      enabled: false
      version: 1
      config:
        custom_labels: []
        # push_gateway:
        #   enabled: false
        #   push_gateway_url: ""
        #   job_name: "bifrost"
        #   instance_id: ""
        #   push_interval: 15
        #   basic_auth:
        #     username: ""
        #     password: ""

    logging:
      enabled: false
      version: 1
      config:
        disable_content_logging: false
        logging_headers: []

    governance:
      enabled: false
      version: 1
      config:
        is_vk_mandatory: false
        required_headers: []
        is_enterprise: false

    maxim:
      enabled: false
      version: 1
      config:
        api_key: ""
        log_repo_id: ""
      # Use existing Kubernetes secret for API key (takes precedence over config.api_key)
      secretRef:
        name: ""
        key: "api-key"

    semanticCache:
      enabled: false
      version: 1
      config:
        # Semantic caching mode (dimension > 1): requires provider, keys, and embedding_model
        # Direct caching mode (dimension: 1): hash-based exact matching, no embedding provider needed
        provider: "openai"
        keys: []
        embedding_model: "text-embedding-3-small"
        dimension: 1536
        threshold: 0.8
        ttl: "5m"
        conversation_history_threshold: 3
        cache_by_model: true
        cache_by_provider: true
        exclude_system_prompt: false
        vector_store_namespace: ""

    otel:
      enabled: false
      version: 1
      config:
        # plugin_span_filter:         # Optional: filter which plugin hook spans are exported
        #   mode: "include"           # "include" or "exclude"
        #   plugins: ["maxim", "otel"]
        #
        # Multi-profile shape (use profiles OR the flat single-profile fields below, not both):
        # profiles:
        #   - service_name: "bifrost"
        #     collector_url: ""       # e.g., http://otel-collector:4318 (HTTP) or otel-collector:4317 (gRPC)
        #     trace_type: "genai_extension" # genai_extension | vercel | open_inference
        #     protocol: "grpc"        # http | grpc
        #     metrics_enabled: false
        #     metrics_endpoint: ""    # e.g., http://otel-collector:4318/v1/metrics (HTTP) or otel-collector:4317 (gRPC)
        #     metrics_push_interval: 15 # Push interval in seconds (1-300)
        #     headers: {}
        #     tls_ca_cert: ""         # Path to TLS CA certificate file
        #     insecure: true          # Skip TLS verification (ignored if tls_ca_cert is set)
        #     disable_content_logging: false
        #
        # Single-profile shape:
        service_name: "bifrost"
        collector_url: ""             # e.g., http://otel-collector:4318 (HTTP) or otel-collector:4317 (gRPC)
        trace_type: "genai_extension" # genai_extension | vercel | open_inference
        protocol: "grpc"              # http | grpc
        # Push-based metrics export via OTLP (recommended for multi-node clusters)
        metrics_enabled: false
        metrics_endpoint: ""          # e.g., http://otel-collector:4318/v1/metrics (HTTP) or otel-collector:4317 (gRPC)
        metrics_push_interval: 15     # Push interval in seconds (1-300)
        # Custom headers for the collector (supports env.VAR_NAME prefix)
        headers: {}
        # TLS configuration
        tls_ca_cert: "" # Path to TLS CA certificate file
        insecure: false # Skip TLS verification (ignored if tls_ca_cert is set)
        # Drop message content (input/output messages, embeddings, tool defs/args/results) from exported spans
        disable_content_logging: false
    datadog:
      enabled: false
      version: 1
      config:
        service_name: "bifrost"
        # Datadog Agent address. Supports env.VAR_NAME references — e.g. set
        # agent_addr: "env.DD_AGENT_ADDR" and inject DD_AGENT_ADDR via the
        # top-level `env:` (e.g. from status.hostIP for a node-local agent DaemonSet).
        agent_addr: "localhost:8126"
        # dogstatsd_addr: "localhost:8125"  # DogStatsD address (supports env.VAR_NAME)
        # Alternatively, set host and port separately (common in Kubernetes, where the
        # host comes from the downward API status.hostIP and the port is fixed — the two
        # can't be collapsed into one env var). When a *_host is set it takes precedence
        # over the matching *_addr; the *_port defaults to 8126 (agent) / 8125 (DogStatsD).
        # agent_host: "env.DD_AGENT_HOST"
        # agent_port: "8126"
        # dogstatsd_host: "env.DD_AGENT_HOST"
        # dogstatsd_port: "8125"
        env: ""
        version: ""
        custom_tags: {}
        enable_traces: true
        # ml_app: ""                  # ML app name for LLM Observability (defaults to service_name)
        # enable_metrics: true
        # enable_llm_obs: true
        # group_traces_by_session: false  # Group requests sharing x-bf-session-id into one APM trace (agent mode only)
        # disable_content_logging: false
        # request_headers: []         # Header name patterns (exact or wildcard like "x-custom-*")
        # Agentless mode (direct to Datadog API, no local agent):
        # agentless: true
        # api_key: "env.DD_API_KEY"   # Required for agentless mode (supports env.VAR_NAME)
        # site: "datadoghq.com"       # Datadog site/region (e.g. datadoghq.eu)
        # plugin_span_filter:         # Optional: filter which plugin hook spans are exported
        #   mode: "exclude"           # "include" or "exclude"
        #   plugins: ["logging"]

    bigquery:
      enabled: false
      version: 1
      config:
        project_id: ""                # GCP project ID (required when enabled)
        dataset_id: "bifrost_traces"
        table_id: "traces"
        location: "US"
        # service_account_key: ""     # Service account key JSON, or "env.VAR". Omit to use ADC.
        create_table_if_not_exists: true
        flush_interval_seconds: 5
        buffer_size: 500
        custom_labels: {}
        disable_content_logging: false
        # request_headers: []         # Header name patterns (exact or wildcard like "x-custom-*")
        # plugin_span_filter:         # Optional: filter which plugin hook spans are exported
        #   mode: "exclude"           # "include" or "exclude"
        #   plugins: ["logging"]

    kafka:
      enabled: false
      version: 1
      config:
        brokers: []                   # Kafka broker addresses (required when enabled)
        topic: ""                     # Topic to publish traces to (required when enabled)
        sasl_enabled: false
        # sasl:
        #   mechanism: "PLAIN"        # PLAIN | SCRAM-SHA-256 | SCRAM-SHA-512
        #   username: "env.KAFKA_USERNAME"
        #   password: "env.KAFKA_PASSWORD"
        tls_enabled: false
        # ca_cert: "env.KAFKA_CA_CERT" # PEM CA certificate to verify the broker. Omit to use the system CA pool.
        compression: "none"           # none | gzip | snappy | lz4 | zstd
        batch_size: 100
        flush_interval_ms: 1000
        auto_create_topic: false
        disable_content_logging: false
        # request_headers: []         # Header name patterns (exact or wildcard like "x-custom-*")
        # plugin_span_filter:         # Optional: filter which plugin hook spans are exported
        #   mode: "exclude"           # "include" or "exclude"
        #   plugins: ["logging"]

    pubsub:
      enabled: false
      version: 1
      config:
        project_id: ""                # GCP project ID (required when enabled)
        topic_id: ""                  # Pub/Sub topic ID (required when enabled)
        # service_account_key: ""     # Service account key JSON, or "env.VAR". Omit to use ADC.
        auto_create_topic: false
        disable_content_logging: false
        # request_headers: []         # Header name patterns (exact or wildcard like "x-custom-*")
        # plugin_span_filter:         # Optional: filter which plugin hook spans are exported
        #   mode: "exclude"           # "include" or "exclude"
        #   plugins: ["logging"]

    # Custom/dynamic plugins
    custom: []
      # - name: "my-custom-plugin"
      #   enabled: true
      #   path: "/plugins/my-plugin.so"
      #   version: 1 # must be >= 1; increase to force DB-backed plugin config replacement
      #   config:
      #     key: value

  # Governance configuration for budgets, rate limits, customers, teams, virtual keys, and routing rules
  governance:
    budgets: []
      # - id: "budget-1"
      #   max_limit: 100
      #   reset_duration: "1M"     # Supports: 30s, 5m, 1h, 1d, 1w, 1M, 1Y
    rateLimits: []
      # - id: "rate-limit-1"
      #   token_max_limit: 100000
      #   token_reset_duration: "1d"
      #   request_max_limit: 1000
      #   request_reset_duration: "1h"
    customers: []
